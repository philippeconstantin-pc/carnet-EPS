<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de Bord EPS — BTSA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --vert: #2ECC71;
    --vert-dark: #27AE60;
    --orange: #E67E22;
    --rouge: #E74C3C;
    --bleu: #3498DB;
    --jaune: #F1C40F;
    --bg: #0F1117;
    --bg2: #181C27;
    --bg3: #1E2333;
    --border: rgba(255,255,255,0.08);
    --text: #E8EAF0;
    --muted: #7A8099;
    --accent: #2ECC71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ÉCRAN ACCUEIL ── */
  #screen-home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,204,113,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,204,113,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .logo-block {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.7s ease both;
  }

  .logo-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--vert);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .logo-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    line-height: 1.05;
    color: #fff;
  }

  .logo-title span {
    color: var(--vert);
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.75rem;
    letter-spacing: 0.1em;
  }

  .input-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.7s 0.15s ease both;
  }

  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: block;
  }

  .code-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }

  .code-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
  .code-input:focus {
    border-color: var(--vert);
    box-shadow: 0 0 0 3px rgba(46,204,113,0.15);
  }

  .btn-primary {
    width: 100%;
    margin-top: 1.2rem;
    background: var(--vert);
    color: #0F1117;
    border: none;
    border-radius: 10px;
    padding: 0.9rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--vert-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

  .error-msg {
    margin-top: 0.8rem;
    font-size: 0.78rem;
    color: var(--rouge);
    font-family: 'DM Mono', monospace;
    text-align: center;
    min-height: 1.2em;
  }

  /* ── ÉCRAN DASHBOARD ── */
  #screen-dash {
    display: none;
    padding: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
    animation: fadeUp 0.5s ease both;
  }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .dash-id {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--vert);
    text-transform: uppercase;
  }

  .dash-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
    margin-top: 0.2rem;
  }

  .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* ── SECTION TITRE ── */
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ── GRILLE AF ── */
  .af-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 500px) {
    .af-grid { grid-template-columns: 1fr; }
  }

  .af-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    position: relative;
    overflow: hidden;
  }

  .af-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .af-card.af1::before { background: var(--vert); }
  .af-card.af2::before { background: var(--bleu); }
  .af-card.af3::before { background: var(--orange); }
  .af-card.af4::before { background: var(--rouge); }

  .af-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .af-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.9rem;
    line-height: 1.3;
  }

  .af-progression {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .af-niveau {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    line-height: 1;
  }

  .af-card.af1 .af-niveau { color: var(--vert); }
  .af-card.af2 .af-niveau { color: var(--bleu); }
  .af-card.af3 .af-niveau { color: var(--orange); }
  .af-card.af4 .af-niveau { color: var(--rouge); }

  .af-arrow {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .af-bar-wrap {
    margin-top: 0.8rem;
  }

  .af-bar-bg {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .af-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  .af-card.af1 .af-bar-fill { background: var(--vert); }
  .af-card.af2 .af-bar-fill { background: var(--bleu); }
  .af-card.af3 .af-bar-fill { background: var(--orange); }
  .af-card.af4 .af-bar-fill { background: var(--rouge); }

  .af-bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 0.3rem;
    display: flex;
    justify-content: space-between;
  }

  /* ── FORMAT MUSCU ── */
  .format-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .format-number {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.5rem;
    color: var(--vert);
    line-height: 1;
    min-width: 2.5rem;
  }

  .format-info {}
  .format-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: var(--vert);
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  .format-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
  }

  /* ── OBJECTIF SMART ── */
  .smart-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .smart-objectif {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 1rem;
    padding-left: 1rem;
    border-left: 3px solid var(--jaune);
  }

  .smart-meta {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .smart-item {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .smart-item-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .smart-item-val {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--jaune);
  }

  /* ── FICHES SÉANCES ── */
  .seances-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .seance-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    display: grid;
    grid-template-columns: 2.5rem 1fr auto;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .seance-item:hover {
    border-color: rgba(46,204,113,0.3);
    background: var(--bg3);
  }

  .seance-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
  }

  .seance-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  .seance-contenu {
    font-size: 0.82rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .seance-borg {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text);
    white-space: nowrap;
  }

  .borg-low { color: var(--vert); }
  .borg-mid { color: var(--jaune); }
  .borg-high { color: var(--rouge); }

  /* ── MODAL SÉANCE ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  .modal-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 16px 16px;
    padding: 1.8rem;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: #fff;
  }

  .modal-close {
    background: var(--bg3);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .modal-close:hover { color: #fff; }

  .modal-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
  }

  .modal-field {
    flex: 1;
    min-width: 120px;
    background: var(--bg3);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
  }

  .modal-field-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .modal-field-val {
    font-size: 0.85rem;
    color: var(--text);
  }

  /* ── LOADING ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 3rem;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--bg3);
    border-top-color: var(--vert);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  /* ── NIVEAU BADGE ── */
  .niveau-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
  }

  .niveau-1 { background: rgba(231,76,60,0.15); color: var(--rouge); }
  .niveau-2 { background: rgba(241,196,15,0.15); color: var(--jaune); }
  .niveau-3 { background: rgba(52,152,219,0.15); color: var(--bleu); }
  .niveau-4 { background: rgba(46,204,113,0.15); color: var(--vert); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- ════════════════════════════════ ÉCRAN ACCUEIL ════════════════════════════════ -->
<div id="screen-home">
  <div class="logo-block">
    <div class="logo-eyebrow">BTSA — Nantes Terre Atlantique</div>
    <div class="logo-title">Carnet<br>de Bord <span>EPS</span></div>
    <div class="logo-sub">Musculation · Raid Nature</div>
  </div>

  <div class="input-card">
    <label class="input-label" for="codeInput">Ton code apprenant</label>
    <input
      class="code-input"
      type="text"
      id="codeInput"
      placeholder="AP-01"
      maxlength="10"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <button class="btn-primary" id="btnAccess" onclick="accederCarnet()">
      Accéder à mon carnet →
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ════════════════════════════════ ÉCRAN DASHBOARD ════════════════════════════════ -->
<div id="screen-dash">
  <div class="dash-header">
    <div>
      <div class="dash-id" id="dashCode"></div>
      <div class="dash-name" id="dashNom"></div>
    </div>
    <button class="btn-back" onclick="retourAccueil()">← Retour</button>
  </div>

  <div id="dashContent"></div>
</div>

<!-- ════════════════════════════════ MODAL SÉANCE ════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="fermerModal(event)">
  <div class="modal-card" id="modalCard">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Séance</div>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_ID = '16aeUl8jBZBW0qTvh22vDjlznAEESRwOWITnOdWLGrNM';

// Noms des onglets (doit correspondre exactement au Sheets)
const TABS = {
  etudiants:  'Étudiants',
  seances:    'Séances',
  objectifs:  'Objectifs',
  bilans:     'Bilans',
};

// URL CSV pour un onglet
const csvUrl = (tab) =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;

// ─── STATE ────────────────────────────────────────────────────────────────────
let DATA = {};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

async function fetchTab(tab) {
  try {
    const r = await fetch(csvUrl(tab));
    if (!r.ok) return [];
    const txt = await r.text();
    return parseCSV(txt);
  } catch { return []; }
}

function borgClass(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  if (n <= 4) return 'borg-low';
  if (n <= 7) return 'borg-mid';
  return 'borg-high';
}

function niveauBadge(n) {
  const labels = { '1':'Débutant','2':'En cours','3':'Acquis','4':'Maîtrisé' };
  const lbl = labels[String(n)] || `N${n}`;
  return `<span class="niveau-badge niveau-${n}">${lbl}</span>`;
}

function barWidth(n, max) {
  return Math.round((parseFloat(n)||0) / max * 100);
}

// ─── ACCUEIL ──────────────────────────────────────────────────────────────────
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') accederCarnet();
});

async function accederCarnet() {
  const input = document.getElementById('codeInput');
  const code = input.value.trim().toUpperCase();
  const btn = document.getElementById('btnAccess');
  const err = document.getElementById('errorMsg');

  if (!code) { err.textContent = 'Entre ton code apprenant.'; return; }

  btn.disabled = true;
  btn.textContent = 'Chargement…';
  err.textContent = '';

  // Fetch tous les onglets
  const [etudiants, seances, objectifs, bilans] = await Promise.all([
    fetchTab(TABS.etudiants),
    fetchTab(TABS.seances),
    fetchTab(TABS.objectifs),
    fetchTab(TABS.bilans),
  ]);

  btn.disabled = false;
  btn.textContent = 'Accéder à mon carnet →';

  // Cherche l'étudiant (colonne "Code" ou "code_ap" ou première colonne)
  const etudiant = etudiants.find(r => {
    const v = Object.values(r)[0] || r['Code'] || r['code_ap'] || r['CODE'] || '';
    return v.trim().toUpperCase() === code;
  });

  if (!etudiant) {
    err.textContent = `Code "${code}" introuvable. Vérifie et réessaie.`;
    return;
  }

  DATA = {
    etudiant,
    seances: seances.filter(r => {
      const v = Object.values(r)[0] || r['Code'] || '';
      return v.trim().toUpperCase() === code;
    }),
    objectif: objectifs.find(r => {
      const v = Object.values(r)[0] || r['Code'] || '';
      return v.trim().toUpperCase() === code;
    }) || null,
    bilan: bilans.find(r => {
      const v = Object.values(r)[0] || r['Code'] || '';
      return v.trim().toUpperCase() === code;
    }) || null,
  };

  afficherDashboard(code);
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function afficherDashboard(code) {
  document.getElementById('screen-home').style.display = 'none';
  const dash = document.getElementById('screen-dash');
  dash.style.display = 'block';

  const e = DATA.etudiant;
  const keys = Object.keys(e);
  const nom = e['Nom'] || e['NOM'] || e['nom'] || e[keys[1]] || code;
  const prenom = e['Prénom'] || e['PRENOM'] || e['prenom'] || e[keys[2]] || '';

  document.getElementById('dashCode').textContent = code;
  document.getElementById('dashNom').textContent = `${prenom} ${nom}`.trim();

  // Récupère les niveaux AF
  const af = {
    af1i: e['AF1_initial'] || e['AF1 initial'] || e['af1_initial'] || '',
    af1f: e['AF1_final']   || e['AF1 final']   || e['af1_final']   || '',
    af2i: e['AF2_initial'] || e['AF2 initial'] || e['af2_initial'] || '',
    af2f: e['AF2_final']   || e['AF2 final']   || e['af2_final']   || '',
    af3i: e['AF3_initial'] || e['AF3 initial'] || e['af3_initial'] || '',
    af3f: e['AF3_final']   || e['AF3 final']   || e['af3_final']   || '',
    af4i: e['AF4_initial'] || e['AF4 initial'] || e['af4_initial'] || '',
    af4f: e['AF4_final']   || e['AF4 final']   || e['af4_final']   || '',
  };

  // Format muscu
  const formatNum = e['Format'] || e['format'] || e['Format_muscu'] || '';
  const formats = {
    '1': 'Endurance musculaire & circuit training',
    '2': 'Force & gainage postural',
    '3': 'Pliométrie & gainage postural',
    '4': 'Mobilité & reprise d\'activité',
  };
  const formatNom = formats[formatNum] || (formatNum ? `Format ${formatNum}` : null);

  let html = '';

  // ── AF GRID ──
  html += `<div class="section-title">Autoévaluation AF1–AF4</div>`;
  html += `<div class="af-grid">`;

  const afDefs = [
    { id:'af1', cls:'af1', label:'AF1', title:'S\'investir dans une démarche de santé', ci:af.af1i, cf:af.af1f },
    { id:'af2', cls:'af2', label:'AF2', title:'Gérer et entretenir sa condition physique', ci:af.af2i, cf:af.af2f },
    { id:'af3', cls:'af3', label:'AF3', title:'Travailler en équipe et gérer un projet', ci:af.af3i, cf:af.af3f },
    { id:'af4', cls:'af4', label:'AF4', title:'Faire preuve d\'autonomie et d\'initiative', ci:af.af4i, cf:af.af4f },
  ];

  for (const af of afDefs) {
    const ni = parseFloat(af.ci) || 0;
    const nf = parseFloat(af.cf) || 0;
    const showFinal = nf > 0;
    const displayed = showFinal ? nf : ni;
    const pct = barWidth(displayed, 4);
    const arrow = ni > 0 && nf > 0
      ? (nf > ni ? `<span style="color:var(--vert)">▲ +${nf-ni}</span>`
        : nf < ni ? `<span style="color:var(--rouge)">▼ ${nf-ni}</span>`
        : `<span style="color:var(--muted)">= </span>`)
      : '';

    html += `
    <div class="af-card ${af.cls}">
      <div class="af-label">${af.label}</div>
      <div class="af-title">${af.title}</div>
      <div class="af-progression">
        ${ni > 0 ? `<div class="af-niveau" style="font-size:1.1rem;color:var(--muted)">${ni}</div>` : ''}
        ${ni > 0 && nf > 0 ? `<div class="af-arrow">→</div>` : ''}
        <div class="af-niveau">${displayed || '—'}</div>
        <div style="margin-left:auto">${arrow}</div>
      </div>
      <div class="af-bar-wrap">
        <div class="af-bar-bg">
          <div class="af-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="af-bar-label"><span>N1</span><span>N4</span></div>
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── FORMAT MUSCU ──
  if (formatNom) {
    html += `<div class="section-title">Format musculation</div>`;
    html += `
    <div class="format-card">
      <div class="format-number">${formatNum}</div>
      <div class="format-info">
        <div class="format-tag">Format choisi</div>
        <div class="format-name">${formatNom}</div>
      </div>
    </div>`;
  }

  // ── OBJECTIF SMART ──
  if (DATA.objectif) {
    const obj = DATA.objectif;
    const objKeys = Object.keys(obj);
    const objectifText = obj['Objectif'] || obj['objectif'] || obj['objectif_smart'] || obj[objKeys[1]] || '';
    const dateEch = obj['Échéance'] || obj['Echeance'] || obj['echeance'] || obj['date_echeance'] || '';
    const qualites = obj['Qualités'] || obj['Qualites'] || obj['qualites'] || obj['qualites_travaillees'] || '';

    if (objectifText) {
      html += `<div class="section-title">Objectif SMART</div>`;
      html += `
      <div class="smart-card">
        <div class="smart-objectif">${objectifText}</div>
        <div class="smart-meta">
          ${dateEch ? `<div class="smart-item"><div class="smart-item-label">Échéance</div><div class="smart-item-val">${dateEch}</div></div>` : ''}
          ${qualites ? `<div class="smart-item"><div class="smart-item-label">Qualités travaillées</div><div class="smart-item-val">${qualites}</div></div>` : ''}
        </div>
      </div>`;
    }
  }

  // ── FICHES SÉANCES ──
  html += `<div class="section-title">Fiches séance (${DATA.seances.length})</div>`;

  if (DATA.seances.length === 0) {
    html += `<div class="empty-state">Aucune séance enregistrée pour le moment.</div>`;
  } else {
    html += `<div class="seances-list">`;
    DATA.seances.forEach((s, i) => {
      const skeys = Object.keys(s);
      const num = s['Séance'] || s['Seance'] || s['seance'] || s['N°'] || (i+1);
      const date = s['Date'] || s['date'] || '';
      const contenu = s['Contenu'] || s['contenu'] || s['activite'] || s['Activité'] || s[skeys[2]] || '—';
      const borg = s['Borg'] || s['borg'] || s['RPE'] || '';
      const borgCls = borgClass(borg);

      html += `
      <div class="seance-item" onclick="ouvrirSeance(${i})">
        <div class="seance-num">S${String(num).padStart(2,'0')}</div>
        <div>
          <div class="seance-date">${date || '—'}</div>
          <div class="seance-contenu">${contenu}</div>
        </div>
        ${borg ? `<div class="seance-borg ${borgCls}">Borg ${borg}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('dashContent').innerHTML = html;
}

// ─── MODAL SÉANCE ─────────────────────────────────────────────────────────────
function ouvrirSeance(idx) {
  const s = DATA.seances[idx];
  const i = parseFloat(s['Séance'] || s['Seance'] || idx+1);
  document.getElementById('modalTitle').textContent = `Séance ${i}`;

  // Affiche tous les champs non vides
  const exclude = ['Code','code','code_ap'];
  let rows = '';
  const entries = Object.entries(s).filter(([k,v]) => v && !exclude.includes(k));

  // On groupe par paires
  for (let j = 0; j < entries.length; j += 2) {
    rows += `<div class="modal-row">`;
    for (let k = j; k < Math.min(j+2, entries.length); k++) {
      const [key, val] = entries[k];
      rows += `
        <div class="modal-field">
          <div class="modal-field-label">${key}</div>
          <div class="modal-field-val">${val}</div>
        </div>`;
    }
    rows += `</div>`;
  }

  document.getElementById('modalBody').innerHTML = rows || '<div class="empty-state">Pas de données.</div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function fermerModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ─── RETOUR ───────────────────────────────────────────────────────────────────
function retourAccueil() {
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('errorMsg').textContent = '';
}
</script>
</body>
</html>
