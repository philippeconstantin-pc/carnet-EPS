<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de Bord EPS — BTSA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --vert: #2ECC71; --vert-dark: #27AE60;
  --orange: #E67E22; --rouge: #E74C3C;
  --bleu: #3498DB; --jaune: #F1C40F;
  --violet: #9B59B6;
  --bg: #0F1117; --bg2: #181C27; --bg3: #1E2333;
  --border: rgba(255,255,255,0.08);
  --text: #E8EAF0; --muted: #7A8099;
  --faible: #D12026; --insuffisant: #F68714;
  --moyen: #FEF200; --bon: #43B23C; --excellent: #00ADEF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(46,204,113,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }

/* ACCUEIL */
#screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.logo-block { text-align: center; margin-bottom: 3rem; animation: fadeDown 0.7s ease both; }
.logo-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--vert); text-transform: uppercase; margin-bottom: 0.75rem; }
.logo-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; line-height: 1.05; color: #fff; }
.logo-title span { color: var(--vert); }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 0.75rem; letter-spacing: 0.1em; }
.input-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 2.5rem; width: 100%; max-width: 420px; animation: fadeUp 0.7s 0.15s ease both; }
.input-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; display: block; }
.code-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; outline: none; transition: border-color 0.2s; text-align: center; }
.code-input:focus { border-color: var(--vert); box-shadow: 0 0 0 3px rgba(46,204,113,0.15); }
.btn-primary { width: 100%; margin-top: 1.2rem; background: var(--vert); color: #0F1117; border: none; border-radius: 10px; padding: 0.9rem 1.5rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
.btn-primary:hover { background: var(--vert-dark); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.error-msg { margin-top: 0.8rem; font-size: 0.78rem; color: var(--rouge); font-family: 'DM Mono', monospace; text-align: center; min-height: 1.2em; }

/* DASHBOARD */
#screen-dash { display: none; padding: 1.5rem; max-width: 960px; margin: 0 auto; animation: fadeUp 0.5s ease both; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
.dash-id { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--vert); text-transform: uppercase; }
.dash-name { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; margin-top: 0.2rem; }
.btn-back { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; }
.btn-back:hover { color: var(--text); }

/* ONGLETS */
.tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--bg2); border-radius: 12px; padding: 0.4rem; }
.tab-btn { flex: 1; padding: 0.7rem 1rem; border: none; border-radius: 9px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
.tab-btn.active-muscu { background: var(--vert); color: #0F1117; }
.tab-btn.active-raid { background: var(--orange); color: #fff; }
.tab-btn:not(.active-muscu):not(.active-raid):hover { color: var(--text); background: var(--bg3); }

/* SECTION */
.section-title { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); margin-top: 2rem; }

/* NIVEAU BADGE */
.niv { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; }
.niv-faible { background: rgba(209,32,38,0.2); color: #ff6b6b; }
.niv-insuffisant { background: rgba(246,135,20,0.2); color: #ffa94d; }
.niv-moyen { background: rgba(254,242,0,0.15); color: #ffe066; }
.niv-bon { background: rgba(67,178,60,0.2); color: var(--vert); }
.niv-excellent { background: rgba(0,173,239,0.2); color: var(--bleu); }

/* TESTS V2 */
.test-row-v2 { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.4rem; }
.test-row-left { display: flex; align-items: center; gap: 0.6rem; min-width: 130px; }
.test-icone { font-size: 1rem; min-width: 1.2rem; text-align: center; }
.test-label-v2 { font-size: 0.78rem; color: var(--muted); }
.test-row-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; justify-content: flex-end; }
.test-score-bloc { display: flex; align-items: center; gap: 0.4rem; }
.test-score-val { font-family: 'DM Mono', monospace; font-size: 0.9rem; font-weight: 600; color: var(--muted); }
.test-arrow { color: var(--muted); font-size: 0.8rem; }
.tests-grid { margin-bottom: 0.5rem; }
.rubrique-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--text); margin: 1rem 0 0.5rem; padding: 0.3rem 0.8rem; background: var(--bg3); border-radius: 6px; display: inline-block; }

/* FORMAT */
.format-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; display: flex; align-items: center; gap: 1.2rem; }
.format-number { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.5rem; color: var(--vert); line-height: 1; min-width: 2.5rem; }
.format-tag { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.2em; color: var(--vert); text-transform: uppercase; margin-bottom: 0.2rem; }
.format-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; }

/* SMART */
.smart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem; }
.smart-phrase { font-size: 0.95rem; color: var(--text); line-height: 1.6; font-style: italic; padding-left: 1rem; border-left: 3px solid var(--jaune); margin-bottom: 1rem; }
.smart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; }
.smart-item { background: var(--bg3); border-radius: 8px; padding: 0.7rem 0.9rem; }
.smart-item-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.smart-item-val { font-size: 0.82rem; color: var(--text); line-height: 1.4; }

/* SEANCES MUSCU */
.seances-list { display: flex; flex-direction: column; gap: 0.6rem; }
.seance-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; display: grid; grid-template-columns: 3rem 1fr auto; align-items: center; gap: 1rem; cursor: pointer; transition: border-color 0.2s; }
.seance-item:hover { border-color: rgba(46,204,113,0.3); background: var(--bg3); }
.seance-num { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: center; }
.seance-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; }
.seance-contenu { font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seance-borg { font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: var(--bg3); white-space: nowrap; }
.borg-low { color: var(--vert); } .borg-mid { color: var(--jaune); } .borg-high { color: var(--rouge); }

/* REFLEXIONS */
.reflexion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.6rem; }
.reflexion-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
.reflexion-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
.reflexion-val { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

/* RAID STATS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
.stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; line-height: 1; color: var(--orange); }
.stat-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-top: 0.4rem; }
.stat-card.bleu .stat-val { color: var(--bleu); }
.stat-card.vert .stat-val { color: var(--vert); }
.stat-card.violet .stat-val { color: var(--violet); }

/* CYCLES */
.cycles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.cycle-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; position: relative; overflow: hidden; }
.cycle-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.cycle-card.c1::before { background: var(--bleu); }
.cycle-card.c2::before { background: var(--orange); }
.cycle-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.cycle-pts { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1; }
.cycle-card.c1 .cycle-pts { color: var(--bleu); }
.cycle-card.c2 .cycle-pts { color: var(--orange); }
.cycle-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

/* SEANCES RAID */
.seance-raid { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.2s; margin-bottom: 0.6rem; }
.seance-raid:hover { border-color: rgba(230,126,34,0.3); background: var(--bg3); }
.seance-raid-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.seance-raid-left { display: flex; align-items: center; gap: 0.8rem; }
.seance-cycle-tag { font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 20px; }
.tag-c1 { background: rgba(52,152,219,0.2); color: var(--bleu); }
.tag-c2 { background: rgba(230,126,34,0.2); color: var(--orange); }
.seance-pts { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--orange); }
.seance-pts-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); }
.equipe-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
.equipe-tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: rgba(155,89,182,0.15); color: var(--violet); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
.modal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 16px 16px; padding: 1.8rem; width: 100%; max-width: 650px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; }
.modal-close { background: var(--bg3); border: none; border-radius: 50%; width: 32px; height: 32px; color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.modal-section { margin-bottom: 1.2rem; }
.modal-section-title { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--orange); text-transform: uppercase; margin-bottom: 0.6rem; }
.modal-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.modal-field { flex: 1; min-width: 140px; background: var(--bg3); border-radius: 8px; padding: 0.7rem 0.9rem; }
.modal-field-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.modal-field-val { font-size: 0.82rem; color: var(--text); line-height: 1.4; }

/* EMPTY */
.empty-state { text-align: center; padding: 2rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; }

/* ANIMATIONS */
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
@media (max-width: 500px) { .cycles-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- ACCUEIL -->
<div id="screen-home">
  <div class="logo-block">
    <div class="logo-eyebrow">BTSA — Nantes Terre Atlantique</div>
    <div class="logo-title">Carnet<br>de Bord <span>EPS</span></div>
    <div class="logo-sub">Musculation · Raid Nature</div>
  </div>
  <div class="input-card">
    <label class="input-label" for="codeInput">Ton code apprenant</label>
    <input class="code-input" type="text" id="codeInput" placeholder="AP-01" maxlength="10" autocomplete="off" spellcheck="false">
    <button class="btn-primary" id="btnAccess" onclick="accederCarnet()">Accéder à mon carnet →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dash">
  <div class="dash-header">
    <div>
      <div class="dash-id" id="dashCode"></div>
      <div class="dash-name" id="dashNom"></div>
    </div>
    <button class="btn-back" onclick="retourAccueil()">← Retour</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active-muscu" id="tab-muscu" onclick="switchTab('muscu')">🏋️ Musculation</button>
    <button class="tab-btn" id="tab-raid" onclick="switchTab('raid')">🏃 Raid Nature</button>
  </div>
  <div id="content-muscu"></div>
  <div id="content-raid" style="display:none"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="fermerModal(event)">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── URLS CSV ───────────────────────────────────────────────────────────────
const TAB_URLS = {
  'Bilan initial':    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=1141001204&single=true&output=csv',
  'Objectif SMART':   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=598462072&single=true&output=csv',
  'Fiche seance':     'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=639278471&single=true&output=csv',
  'Bilan final':      'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=1106003027&single=true&output=csv',
  'Fiche seance Raid':'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=1940990028&single=true&output=csv',
};

const NOMS = {
  "AP-01":"ALBICY Moira","AP-02":"BENUREAU Simon","AP-03":"BUSSSON Augustin",
  "AP-04":"CAILLET Gaspard","AP-05":"DASSIGNY Mathilde","AP-06":"DE CHAMPEAUX Jacinthe",
  "AP-07":"DERUYTER Maeva","AP-08":"DESFOUX Malo","AP-09":"DIAW Oumou",
  "AP-10":"DUCROT Coline","AP-11":"GODBILLOT Violette","AP-12":"KLUTH Nathan",
  "AP-13":"LAGA NGUEMA Axel","AP-14":"LEPAROUX Evann","AP-15":"MELUN Boris",
  "AP-16":"ODOUX Pierre-Adrien","AP-17":"POETE Melane","AP-18":"PONZEVERA Tom",
  "AP-19":"TARTARIN Nicolas","AP-20":"WADRA Jean-Michel"
};

let DATA = {};
let activeTab = 'muscu';

// ── CSV ────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if ((c === ',' || c === '\t') && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

async function fetchTab(tab) {
  try {
    const r = await fetch(TAB_URLS[tab]);
    if (!r.ok) return [];
    return parseCSV(await r.text());
  } catch { return []; }
}

function trouverCode(r) {
  const vals = Object.values(r);
  const keys = Object.keys(r);
  for (let i = 0; i < keys.length; i++) {
    const k = keys[i].toLowerCase().replace(/[^a-z]/g,'');
    const v = vals[i] ? vals[i].toString().trim() : '';
    const match = v.match(/AP-\d+/);
    if (k.includes('code') && match) return match[0].toUpperCase();
  }
  return '';
}

function getSemaineISO(date) {
  if (!date || isNaN(date)) return '?';
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function niveauBadge(val) {
  if (!val) return '';
  const v = val.trim();
  const map = {'faible':'faible','insuffisant':'insuffisant','moyen':'moyen','bon':'bon','excellent':'excellent'};
  for (const [k, cls] of Object.entries(map)) {
    if (v.toLowerCase().includes(k)) return `<span class="niv niv-${cls}">${v}</span>`;
  }
  return `<span class="niv niv-moyen">${v}</span>`;
}

// ── ACCUEIL ────────────────────────────────────────────────────────────────
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') accederCarnet();
});

async function accederCarnet() {
  const input = document.getElementById('codeInput');
  const code = input.value.trim().toUpperCase();
  const btn = document.getElementById('btnAccess');
  const err = document.getElementById('errorMsg');
  if (!code) { err.textContent = 'Entre ton code apprenant.'; return; }
  btn.disabled = true; btn.textContent = 'Chargement…'; err.textContent = '';

  const [bilanInit, objectifs, seancesMuscu, bilanFinal, seancesRaid] = await Promise.all([
    fetchTab('Bilan initial'), fetchTab('Objectif SMART'),
    fetchTab('Fiche seance'), fetchTab('Bilan final'),
    fetchTab('Fiche seance Raid'),
  ]);

  btn.disabled = false; btn.textContent = 'Accéder à mon carnet →';

  const etudiant = bilanInit.find(r => trouverCode(r) === code);
  if (!etudiant && !NOMS[code]) {
    err.textContent = `Code "${code}" introuvable. Vérifie et réessaie.`;
    return;
  }

  DATA = {
    code,
    etudiant: etudiant || {},
    objectif: objectifs.find(r => trouverCode(r) === code) || null,
    seancesMuscu: seancesMuscu.filter(r => trouverCode(r) === code),
    bilanFinal: bilanFinal.find(r => trouverCode(r) === code) || null,
    seancesRaid: seancesRaid.filter(r => trouverCode(r) === code),
  };

  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
  document.getElementById('dashCode').textContent = code;
  document.getElementById('dashNom').textContent = NOMS[code] || code;

  afficherMuscu();
  afficherRaid();
  switchTab('muscu');
}

// ── ONGLETS ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('content-muscu').style.display = tab === 'muscu' ? 'block' : 'none';
  document.getElementById('content-raid').style.display = tab === 'raid' ? 'block' : 'none';
  document.getElementById('tab-muscu').className = 'tab-btn' + (tab === 'muscu' ? ' active-muscu' : '');
  document.getElementById('tab-raid').className = 'tab-btn' + (tab === 'raid' ? ' active-raid' : '');
}

function afficherRaid() {
  const { seancesRaid } = DATA;
  let html = '';

  // Stats
  const seancesC1 = seancesRaid.filter(s => (s['Cycle Raid'] || '').includes('1'));
  const seancesC2 = seancesRaid.filter(s => (s['Cycle Raid'] || '').includes('2'));
  const totalPts = seancesRaid.reduce((sum, s) => sum + (parseFloat(s['Mon total de points ce jour (toutes disciplines)']) || 0), 0);
  const ptsC1 = seancesC1.reduce((sum, s) => sum + (parseFloat(s['Mon total de points ce jour (toutes disciplines)']) || 0), 0);
  const ptsC2 = seancesC2.reduce((sum, s) => sum + (parseFloat(s['Mon total de points ce jour (toutes disciplines)']) || 0), 0);
  const borgs = seancesRaid.map(s => parseFloat(s['Intensité ressentie — Échelle de Borg'] || s['Intensite ressentie - Echelle de Borg'])).filter(v => !isNaN(v));
  const borgMoy = borgs.length > 0 ? (borgs.reduce((a,b) => a+b, 0) / borgs.length).toFixed(1) : '—';

  html += `<div class="section-title">Vue d'ensemble</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${seancesRaid.length}</div><div class="stat-label">Séances</div></div>
    <div class="stat-card"><div class="stat-val">${totalPts}</div><div class="stat-label">Points total</div></div>
    <div class="stat-card bleu"><div class="stat-val">${seancesC1.length}</div><div class="stat-label">Séances C1</div></div>
    <div class="stat-card"><div class="stat-val">${seancesC2.length}</div><div class="stat-label">Séances C2</div></div>
    <div class="stat-card violet"><div class="stat-val">${borgMoy}</div><div class="stat-label">Borg moy.</div></div>
  </div>`;

  html += `<div class="section-title">Points par cycle</div>
  <div class="cycles-grid">
    <div class="cycle-card c1"><div class="cycle-label">Cycle 1 — Automne</div><div class="cycle-pts">${ptsC1}</div><div class="cycle-sub">${seancesC1.length} séance${seancesC1.length > 1 ? 's' : ''}</div></div>
    <div class="cycle-card c2"><div class="cycle-label">Cycle 2 — Printemps</div><div class="cycle-pts">${ptsC2}</div><div class="cycle-sub">${seancesC2.length} séance${seancesC2.length > 1 ? 's' : ''}</div></div>
  </div>`;

  html += `<div class="section-title">Toutes mes séances Raid (${seancesRaid.length})</div>`;
  if (seancesRaid.length === 0) {
    html += `<div class="empty-state">Aucune séance Raid enregistrée pour le moment.</div>`;
  } else {
    const seancesTri = [...seancesRaid].sort((a, b) => {
      return new Date(a['Date de la séance'] || a['Date de la seance'] || 0) - new Date(b['Date de la séance'] || b['Date de la seance'] || 0);
    });
    DATA.seancesRaidTri = seancesTri;

    seancesTri.forEach((s, i) => {
      const date = s['Date de la séance'] || s['Date de la seance'] || '—';
      const disc = s["Discipline(s) pratiquée(s) ce jour"] || s["Discipline(s) pratiquees ce jour"] || '—';
      const cycle = s['Cycle Raid'] || '';
      const cycleTag = cycle.includes('1') ? 'c1' : 'c2';
      const cycleLabel = cycle.includes('1') ? 'C1' : cycle.includes('2') ? 'C2' : '';
      const pts = s['Mon total de points ce jour (toutes disciplines)'] || '';
      const coeqs = [s['Coéquipier 1'] || '', s['Coéquipier 2'] || '', s['Coéquipier 3 (si équipe de 4)'] || '']
        .map(c => { const m = c.match(/AP-\d+/); return m ? m[0] : ''; }).filter(c => c);

      html += `<div class="seance-raid" onclick="ouvrirSeanceRaid(${i})">
        <div class="seance-raid-top">
          <div class="seance-raid-left">
            <div><div class="seance-date">${date}</div><div class="seance-contenu">${disc}</div></div>
            ${cycleLabel ? `<span class="seance-cycle-tag tag-${cycleTag}">${cycleLabel}</span>` : ''}
          </div>
          <div style="text-align:right"><div class="seance-pts">${pts || '—'}</div><div class="seance-pts-label">pts</div></div>
        </div>
        ${coeqs.length > 0 ? `<div class="equipe-tags">${coeqs.map(c => `<span class="equipe-tag">${c}</span>`).join('')}</div>` : ''}
      </div>`;
    });
  }

  html += `<div style="height:3rem"></div>`;
  document.getElementById('content-raid').innerHTML = html;
}

    body += `<div class="modal-section"><div class="modal-section-title">🎯 Laser Run</div><div class="modal-row">`;
    if (s['Nombre de passages Laser Run']) body += `<div class="modal-field"><div class="modal-field-label">Passages</div><div class="modal-field-val">${s['Nombre de passages Laser Run']}</div></div>`;
    if (s['Temps total au Laser Run (en minutes)']) body += `<div class="modal-field"><div class="modal-field-label">Temps</div><div class="modal-field-val">${s['Temps total au Laser Run (en minutes)']} min</div></div>`;
    if (s['Nombre de cibles touchées (total)']) body += `<div class="modal-field"><div class="modal-field-label">Cibles</div><div class="modal-field-val">${s['Nombre de cibles touchées (total)']}</div></div>`;
    if (s['Mes points individuels au Laser Run']) body += `<div class="modal-field"><div class="modal-field-label">Points LR</div><div class="modal-field-val">${s['Mes points individuels au Laser Run']}</div></div>`;
    body += `</div></div>`;
  }

  // Bilan
  body += `<div class="modal-section"><div class="modal-section-title">📊 Bilan</div><div class="modal-row">`;
  if (s['Mon total de points ce jour (toutes disciplines)']) body += `<div class="modal-field"><div class="modal-field-label">Total points</div><div class="modal-field-val" style="font-size:1.2rem;font-weight:700;color:var(--orange)">${s['Mon total de points ce jour (toutes disciplines)']}</div></div>`;
  if (s["Mon rôle principal dans l'équipe ce jour"] || s["Mon role principal dans l'equipe ce jour"]) body += `<div class="modal-field"><div class="modal-field-label">Rôle</div><div class="modal-field-val">${s["Mon rôle principal dans l'équipe ce jour"] || s["Mon role principal dans l'equipe ce jour"]}</div></div>`;
  if (s['Intensité ressentie — Échelle de Borg'] || s['Intensite ressentie - Echelle de Borg']) body += `<div class="modal-field"><div class="modal-field-label">Borg</div><div class="modal-field-val">${s['Intensité ressentie — Échelle de Borg'] || s['Intensite ressentie - Echelle de Borg']}</div></div>`;
  body += `</div>`;
  [
    ["Ce que j'ai apporté", s["Ce que j'ai apporté à l'équipe"] || s["Ce que j'ai apporte a l'equipe"]],
    ["Ce que l'équipe m'a apporté", s["Ce que l'équipe m'a apporté"] || s["Ce que l'equipe m'a apporte"]],
    ["À améliorer", s["Ce que je vais améliorer pour la prochaine séance"] || s["Ce que je vais ameliorer pour la prochaine seance"]],
  ].forEach(([label, val]) => {
    if (!val) return;
    body += `<div class="modal-row"><div class="modal-field"><div class="modal-field-label">${label}</div><div class="modal-field-val">${val}</div></div></div>`;
  });
  body += `</div>`;

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function fermerModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function retourAccueil() {
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('errorMsg').textContent = '';
}
</script>
</body>
</html>
