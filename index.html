<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de Bord EPS — BTSA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --vert: #2ECC71; --vert-dark: #27AE60;
  --orange: #E67E22; --rouge: #E74C3C;
  --bleu: #3498DB; --jaune: #F1C40F;
  --bg: #0F1117; --bg2: #181C27; --bg3: #1E2333;
  --border: rgba(255,255,255,0.08);
  --text: #E8EAF0; --muted: #7A8099;
  --faible: #D12026; --insuffisant: #F68714;
  --moyen: #FEF200; --bon: #43B23C; --excellent: #00ADEF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(46,204,113,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(46,204,113,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }

/* ACCUEIL */
#screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.logo-block { text-align: center; margin-bottom: 3rem; animation: fadeDown 0.7s ease both; }
.logo-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--vert); text-transform: uppercase; margin-bottom: 0.75rem; }
.logo-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; line-height: 1.05; color: #fff; }
.logo-title span { color: var(--vert); }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 0.75rem; letter-spacing: 0.1em; }
.input-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 2.5rem; width: 100%; max-width: 420px; animation: fadeUp 0.7s 0.15s ease both; }
.input-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; display: block; }
.code-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; outline: none; transition: border-color 0.2s, box-shadow 0.2s; text-align: center; }
.code-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
.code-input:focus { border-color: var(--vert); box-shadow: 0 0 0 3px rgba(46,204,113,0.15); }
.btn-primary { width: 100%; margin-top: 1.2rem; background: var(--vert); color: #0F1117; border: none; border-radius: 10px; padding: 0.9rem 1.5rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-primary:hover { background: var(--vert-dark); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.error-msg { margin-top: 0.8rem; font-size: 0.78rem; color: var(--rouge); font-family: 'DM Mono', monospace; text-align: center; min-height: 1.2em; }

/* DASHBOARD */
#screen-dash { display: none; padding: 1.5rem; max-width: 960px; margin: 0 auto; animation: fadeUp 0.5s ease both; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.dash-id { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--vert); text-transform: uppercase; }
.dash-name { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #fff; margin-top: 0.2rem; }
.btn-back { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
.btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* SECTION */
.section-title { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); margin-top: 2rem; }

/* NIVEAU COULEUR */
.niv { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; }
.niv-faible { background: rgba(209,32,38,0.2); color: #ff6b6b; }
.niv-insuffisant { background: rgba(246,135,20,0.2); color: #ffa94d; }
.niv-moyen { background: rgba(254,242,0,0.15); color: #ffe066; }
.niv-bon { background: rgba(67,178,60,0.2); color: var(--vert); }
.niv-excellent { background: rgba(0,173,239,0.2); color: var(--bleu); }

/* TESTS GRID */
.tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.6rem; margin-bottom: 0.5rem; }
.test-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
.test-label { font-size: 0.78rem; color: var(--muted); flex: 1; }
.test-val { font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500; color: var(--text); margin-right: 0.5rem; }

/* TESTS RUBRIQUE */
.rubrique-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--text); margin: 1rem 0 0.5rem; padding: 0.3rem 0.8rem; background: var(--bg3); border-radius: 6px; display: inline-block; }

/* AF GRID */
.af-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 0.5rem; }
@media (max-width: 500px) { .af-grid { grid-template-columns: 1fr; } }
.af-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; position: relative; overflow: hidden; }
.af-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
.af-card.af1::before { background: var(--vert); }
.af-card.af2::before { background: var(--bleu); }
.af-card.af3::before { background: var(--orange); }
.af-card.af4::before { background: var(--rouge); }
.af-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.af-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.9rem; line-height: 1.3; }
.af-niveau { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; line-height: 1; }
.af-card.af1 .af-niveau { color: var(--vert); }
.af-card.af2 .af-niveau { color: var(--bleu); }
.af-card.af3 .af-niveau { color: var(--orange); }
.af-card.af4 .af-niveau { color: var(--rouge); }
.af-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 0.8rem; }
.af-bar-fill { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.af-card.af1 .af-bar-fill { background: var(--vert); }
.af-card.af2 .af-bar-fill { background: var(--bleu); }
.af-card.af3 .af-bar-fill { background: var(--orange); }
.af-card.af4 .af-bar-fill { background: var(--rouge); }
.af-bar-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); margin-top: 0.3rem; display: flex; justify-content: space-between; }

/* FORMAT */
.format-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; display: flex; align-items: center; gap: 1.2rem; }
.format-number { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.5rem; color: var(--vert); line-height: 1; min-width: 2.5rem; }
.format-tag { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.2em; color: var(--vert); text-transform: uppercase; margin-bottom: 0.2rem; }
.format-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; }

/* SMART */
.smart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem; }
.smart-phrase { font-size: 0.95rem; color: var(--text); line-height: 1.6; font-style: italic; padding-left: 1rem; border-left: 3px solid var(--jaune); margin-bottom: 1rem; }
.smart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; }
.smart-item { background: var(--bg3); border-radius: 8px; padding: 0.7rem 0.9rem; }
.smart-item-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.smart-item-val { font-size: 0.82rem; color: var(--text); line-height: 1.4; }

/* SEANCES */
.seances-list { display: flex; flex-direction: column; gap: 0.6rem; }
.seance-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; display: grid; grid-template-columns: 3rem 1fr auto; align-items: center; gap: 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.seance-item:hover { border-color: rgba(46,204,113,0.3); background: var(--bg3); }
.seance-num { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: center; }
.seance-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; }
.seance-contenu { font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seance-borg { font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; background: var(--bg3); white-space: nowrap; }
.borg-low { color: var(--vert); } .borg-mid { color: var(--jaune); } .borg-high { color: var(--rouge); }

/* REFLEXIONS */
.reflexion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.6rem; }
.reflexion-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
.reflexion-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
.reflexion-val { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: flex-end; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
.modal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 16px 16px; padding: 1.8rem; width: 100%; max-width: 650px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; }
.modal-close { background: var(--bg3); border: none; border-radius: 50%; width: 32px; height: 32px; color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: #fff; }
.modal-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
.modal-field { flex: 1; min-width: 140px; background: var(--bg3); border-radius: 8px; padding: 0.7rem 0.9rem; }
.modal-field-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
.modal-field-val { font-size: 0.82rem; color: var(--text); line-height: 1.4; }

/* EMPTY */
.empty-state { text-align: center; padding: 2rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; }

/* ANIMATIONS */
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 36px; height: 36px; border: 3px solid var(--bg3); border-top-color: var(--vert); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div id="screen-home">
  <div class="logo-block">
    <div class="logo-eyebrow">BTSA — Nantes Terre Atlantique</div>
    <div class="logo-title">Carnet<br>de Bord <span>EPS</span></div>
    <div class="logo-sub">Musculation · Raid Nature</div>
  </div>
  <div class="input-card">
    <label class="input-label" for="codeInput">Ton code apprenant</label>
    <input class="code-input" type="text" id="codeInput" placeholder="AP-01" maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-primary" id="btnAccess" onclick="accederCarnet()">Accéder à mon carnet →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<div id="screen-dash">
  <div class="dash-header">
    <div>
      <div class="dash-id" id="dashCode"></div>
      <div class="dash-name" id="dashNom"></div>
    </div>
    <button class="btn-back" onclick="retourAccueil()">← Retour</button>
  </div>
  <div id="dashContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="fermerModal(event)">
  <div class="modal-card" id="modalCard">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Séance</div>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── URLS CSV DIRECTES ──────────────────────────────────────────────────────
const TAB_URLS = {
  'Bilan initial':  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=1141001204&single=true&output=csv',
  'Objectif SMART': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=598462072&single=true&output=csv',
  'Fiche seance':   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=639278471&single=true&output=csv',
  'Bilan final':    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3xiytEjkwoXbp3lbmFZJVv7AmMiSCmFuOm5l2dEx_dqnZqP6n2UJ8S7ovraYXMtSWZb0jYo0Zp6h/pub?gid=1106003027&single=true&output=csv',
};

const NOMS = {
  "AP-01":"ALBICY Moira","AP-02":"BENUREAU Simon","AP-03":"BUSSSON Augustin",
  "AP-04":"CAILLET Gaspard","AP-05":"DASSIGNY Mathilde","AP-06":"DE CHAMPEAUX Jacinthe",
  "AP-07":"DERUYTER Maeva","AP-08":"DESFOUX Malo","AP-09":"DIAW Oumou",
  "AP-10":"DUCROT Coline","AP-11":"GODBILLOT Violette","AP-12":"KLUTH Nathan",
  "AP-13":"LAGA NGUEMA Axel","AP-14":"LEPAROUX Evann","AP-15":"MELUN Boris",
  "AP-16":"ODOUX Pierre-Adrien","AP-17":"POETE Melane","AP-18":"PONZEVERA Tom",
  "AP-19":"TARTARIN Nicolas","AP-20":"WADRA Jean-Michel"
};

let DATA = {};

// ── CSV PARSER ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if ((c === ',' || c === '\t') && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

async function fetchTab(tab) {
  try {
    const url = TAB_URLS[tab];
    if (!url) return [];
    const r = await fetch(url);
    if (!r.ok) return [];
    const txt = await r.text();
    return parseCSV(txt);
  } catch { return []; }
}

function trouverCode(r) {
  const vals = Object.values(r);
  const keys = Object.keys(r);
  for (let i = 0; i < keys.length; i++) {
    const k = keys[i].toLowerCase().replace(/[^a-z]/g,'');
    if (k.includes('code') && vals[i] && vals[i].toString().trim().toUpperCase().startsWith('AP-')) {
      return vals[i].toString().trim().toUpperCase();
    }
  }
  return (vals[2] || vals[1] || vals[0] || '').toString().trim().toUpperCase();
}

// ── NIVEAU BADGE ───────────────────────────────────────────────────────────
function niveauBadge(val) {
  if (!val) return '';
  const v = val.trim();
  const map = {
    'Faible': 'faible', 'Insuffisant': 'insuffisant',
    'Moyen': 'moyen', 'Bon': 'bon', 'Excellent': 'excellent',
    'Moderement actif': 'moyen', 'Actif': 'bon', 'Tres actif': 'excellent',
    'Inactif': 'faible'
  };
  // Cherche correspondance partielle
  for (const [k, cls] of Object.entries(map)) {
    if (v.toLowerCase().includes(k.toLowerCase())) {
      return `<span class="niv niv-${cls}">${v}</span>`;
    }
  }
  return `<span class="niv niv-moyen">${v}</span>`;
}

// ── ACCUEIL ────────────────────────────────────────────────────────────────
function getSemaineISO(date) {
  if (!date || isNaN(date)) return '?';
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') accederCarnet();
});

async function accederCarnet() {
  const input = document.getElementById('codeInput');
  const code = input.value.trim().toUpperCase();
  const btn = document.getElementById('btnAccess');
  const err = document.getElementById('errorMsg');
  if (!code) { err.textContent = 'Entre ton code apprenant.'; return; }
  btn.disabled = true; btn.textContent = 'Chargement…'; err.textContent = '';

  const [bilanInit, objectifs, seances, bilanFinal] = await Promise.all([
    fetchTab('Bilan initial'), fetchTab('Objectif SMART'),
    fetchTab('Fiche seance'), fetchTab('Bilan final'),
  ]);

  btn.disabled = false; btn.textContent = 'Accéder à mon carnet →';

  const etudiant = bilanInit.find(r => trouverCode(r) === code);
  if (!etudiant) { err.textContent = `Code "${code}" introuvable. Vérifie et réessaie.`; return; }

  DATA = {
    code, etudiant,
    objectif: objectifs.find(r => trouverCode(r) === code) || null,
    seances: seances.filter(r => trouverCode(r) === code),
    bilanFinal: bilanFinal.find(r => trouverCode(r) === code) || null,
  };
  afficherDashboard();
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function afficherDashboard() {
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
  const { code, etudiant: e, objectif: obj, seances, bilanFinal: bf } = DATA;

  document.getElementById('dashCode').textContent = code;
  document.getElementById('dashNom').textContent = NOMS[code] || code;

  let html = '';

  // ══════════════════════════════════════════════════════
  // 1. FORMAT MUSCU
  // ══════════════════════════════════════════════════════
  const formatRaw = e["Mon format d'entrainement muscu choisi"] || '';
  const fm = formatRaw.match(/(\d)/);
  const formatNum = fm ? fm[1] : '';
  const formats = {'1':'Endurance musculaire & circuit training','2':'Force & gainage postural','3':'Pliométrie & gainage postural','4':"Mobilité & reprise d'activité"};
  const formatNom = formats[formatNum] || formatRaw;

  if (formatNom) {
    html += `<div class="section-title">Format musculation</div>
    <div class="format-card">
      <div class="format-number">${formatNum}</div>
      <div><div class="format-tag">Format choisi</div><div class="format-name">${formatNom}</div></div>
    </div>`;
  }

  // ══════════════════════════════════════════════════════
  // 2. TESTS BILAN INITIAL
  // ══════════════════════════════════════════════════════
  html += `<div class="section-title">Résultats des tests — Bilan initial</div>`;

  const rubriques = [
    { titre: '🫀 Endurance', tests: [
      ['Step Test - FC apres 1 min de repos en bpm', 'Step Test - mon niveau', 'Step FC'],
      ['6 min marche - distance en metres', '6 min marche - mon niveau', '6 min marche'],
      ['Navette 20m - dernier palier atteint', 'Navette 20m - mon niveau', 'Navette 20m'],
    ]},
    { titre: '💪 Force (partie 1)', tests: [
      ['Assis-Debout 30s - nombre de levees', 'Assis-Debout - mon niveau', 'Assis-Debout'],
      ['Push-up 30s - nombre de repetitions', 'Push-up - mon niveau', 'Push-up'],
      ['Hand-Grip - somme des 2 mains en kg', 'Hand-Grip - mon niveau', 'Hand-Grip'],
      ['Sorensen - temps de maintien en secondes', 'Sorensen - mon niveau', 'Sorensen'],
    ]},
    { titre: '💪 Force (partie 2)', tests: [
      ['Chaise - temps de maintien en secondes', 'Chaise - mon niveau', 'Chaise'],
      ['Shirado - temps de maintien en secondes', 'Shirado - mon niveau', 'Shirado'],
      ['Tirage TRX - nombre de tirages en 1 minute', 'Tirage TRX - mon niveau', 'TRX'],
      ['Pont 1 jambe - temps total gauche + droite en secondes', 'Pont 1 jambe - mon niveau', 'Pont 1 jambe'],
    ]},
    { titre: '⚖️ Équilibre & Souplesse', tests: [
      ['Flamand - meilleur temps en secondes', 'Flamand - mon niveau', 'Flamand'],
      ['Flexometre - distance atteinte en cm', 'Flexometre - mon niveau', 'Flexomètre'],
      ['Chandelier - distance totale poignet-mur G+D en cm', 'Chandelier - mon niveau', 'Chandelier'],
      ['Psoas - distance totale genou par rapport horizontale G+D en cm', 'Psoas - mon niveau', 'Psoas'],
    ]},
    { titre: '⚡ Vitesse & Détente', tests: [
      ['30m - meilleur temps en secondes', '30m - mon niveau', '30m'],
      ['Saut en longueur - distance en cm', 'Saut longueur - mon niveau', 'Saut longueur'],
      ['Sargent - detente verticale M2 moins M1 en cm', 'Sargent - mon niveau', 'Sargent'],
    ]},
    { titre: '📊 Composition corporelle', tests: [
      ['Score Ricci & Gagnon - total sur 45', 'Mon niveau Ricci et Gagnon', 'Ricci & Gagnon'],
      ['Mon IMC calcule (facultatif - strictement confidentiel)', 'Categorie IMC (facultatif)', 'IMC'],
    ]},
  ];

  rubriques.forEach(rub => {
    const lignes = rub.tests.filter(t => e[t[0]] || e[t[1]]);
    if (lignes.length === 0) return;
    html += `<div class="rubrique-title">${rub.titre}</div><div class="tests-grid">`;
    lignes.forEach(([colVal, colNiv, label]) => {
      const val = e[colVal] || '';
      const niv = e[colNiv] || '';
      if (!val && !niv) return;
      // Comparaison bilan final si dispo
      let valFinal = '', nivFinal = '';
      if (bf) {
        const mapFinal = {
          'Step Test - FC apres 1 min de repos en bpm': 'Step Test final - FC en bpm',
          '6 min marche - distance en metres': '6 min marche finale - distance en metres',
          'Navette 20m - dernier palier atteint': 'Navette 20m finale - dernier palier',
          'Assis-Debout 30s - nombre de levees': 'Assis-Debout 30s final - nombre de levees',
          'Push-up 30s - nombre de repetitions': 'Push-up 30s final - nombre de repetitions',
          'Hand-Grip - somme des 2 mains en kg': 'Hand-Grip final - somme des 2 mains en kg',
          'Sorensen - temps de maintien en secondes': 'Sorensen final - temps en secondes',
          'Chaise - temps de maintien en secondes': 'Chaise final - temps en secondes',
          'Shirado - temps de maintien en secondes': 'Shirado final - temps en secondes',
          'Tirage TRX - nombre de tirages en 1 minute': 'Tirage TRX final - nombre en 1 minute',
          'Pont 1 jambe - temps total gauche + droite en secondes': 'Pont 1 jambe final - temps total G+D en secondes',
          'Flamand - meilleur temps en secondes': 'Flamand final - meilleur temps en secondes',
          'Flexometre - distance atteinte en cm': 'Flexometre final - distance en cm',
          'Chandelier - distance totale poignet-mur G+D en cm': 'Chandelier final - distance totale poignet-mur G+D en cm',
          'Psoas - distance totale genou par rapport horizontale G+D en cm': 'Psoas final - distance totale genou par rapport horizontale G+D en cm',
          '30m - meilleur temps en secondes': '30m final - meilleur temps en secondes',
          'Saut en longueur - distance en cm': 'Saut en longueur final - distance en cm',
          'Sargent - detente verticale M2 moins M1 en cm': 'Sargent final - detente M2 moins M1 en cm',
        };
        valFinal = bf[mapFinal[colVal]] || '';
        nivFinal = bf[mapFinal[colNiv]?.replace('mon niveau','niveau')?.replace('- mon','-')] || bf[colNiv.replace('mon niveau','niveau')] || '';
      }
      const progression = val && valFinal
        ? ` <span style="color:var(--muted);font-size:0.7rem">→ ${valFinal}</span>` : '';
      html += `<div class="test-row">
        <span class="test-label">${label}</span>
        <span class="test-val">${val}${progression}</span>
        ${niveauBadge(nivFinal || niv)}
      </div>`;
    });
    html += `</div>`;
  });

  // ══════════════════════════════════════════════════════
  // 3. OBJECTIF SMART
  // ══════════════════════════════════════════════════════
  if (obj) {
    html += `<div class="section-title">Objectif SMART</div>
    <div class="smart-card">`;
    const phrase = obj["Mon objectif SMART complet en une phrase"] || '';
    if (phrase) html += `<div class="smart-phrase">${phrase}</div>`;
    html += `<div class="smart-grid">`;
    const smartFields = [
      ['Qualité travaillée', obj["La qualite sur laquelle je veux progresser"]],
      ['Résultat initial', obj["Mon resultat initial sur le test correspondant"]],
      ['S — Spécifique', obj["S - Specifique : qu'est-ce que je veux ameliorer exactement ?"]],
      ['M — Mesurable', obj["M - Mesurable : comment je sais que j'ai progresse ?"]],
      ['A — Atteignable', obj["A - Atteignable : pourquoi cet objectif est realiste ?"]],
      ['R — Relevant', obj["R - Relevant : en quoi cet objectif est important pour moi ?"]],
      ['T — Temporel', obj["T - Temporel : dans quel delai et avec quels jalons ?"]],
      ['Activité(s)', obj["Activite(s) que je vais pratiquer"]],
      ['Fréquence hors cours', obj["Frequence hors cours"]],
      ['Ma promesse', obj["Ma promesse a moi-meme"]],
    ];
    smartFields.forEach(([label, val]) => {
      if (!val) return;
      html += `<div class="smart-item"><div class="smart-item-label">${label}</div><div class="smart-item-val">${val}</div></div>`;
    });
    html += `</div></div>`;
  }

  // ══════════════════════════════════════════════════════
  // 4. FICHES SÉANCE
  // ══════════════════════════════════════════════════════
  html += `<div class="section-title">Fiches séance (${seances.length})</div>`;
  if (seances.length === 0) {
    html += `<div class="empty-state">Aucune séance enregistrée pour le moment.</div>`;
  } else {
    html += `<div class="seances-list">`;
    seances.forEach((s, i) => {
      const date = s['Date de la seance'] || '';
      const apsa = s['APSA pratiquee ce jour'] || '—';
      const borg = s['Intensite ressentie - Echelle de Borg'] || '';
      const borgN = parseFloat(borg);
      const borgCls = isNaN(borgN) ? '' : borgN <= 4 ? 'borg-low' : borgN <= 7 ? 'borg-mid' : 'borg-high';
      // Calcul numéro de semaine ISO depuis la date
      const semNum = date ? getSemaineISO(new Date(date)) : (i+1);
      html += `<div class="seance-item" onclick="ouvrirSeance(${i})">
        <div class="seance-num">S${String(semNum).padStart(2,'0')}</div>
        <div>
          <div class="seance-date">${date}</div>
          <div class="seance-contenu">${apsa}</div>
        </div>
        ${borg ? `<div class="seance-borg ${borgCls}">Borg ${borg}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // ══════════════════════════════════════════════════════
  // 5. BILAN FINAL
  // ══════════════════════════════════════════════════════
  if (bf) {
    html += `<div class="section-title">Bilan final</div>`;

    // Auto-positionnement AF
    const afData = [
      {cls:'af1', label:'AF1', title:"S'investir dans une démarche de santé",
       val: bf["Mon auto-positionnement global sur la capacite C2.1"] || ''},
    ];

    // Réflexions bilan final
    const reflexFinal = [
      ['AF1 — Tests & projet muscu', bf["AF1 - Ce que les tests m'ont appris sur moi en musculation"]],
      ['AF1 — Utilisation des tests', bf["AF1 - Comment j'ai utilise les tests pour construire mon projet"]],
      ['AF2 — Échauffement & récup', bf["AF2 - Evolution de mon echauffement et de ma recuperation"]],
      ['AF2 — Ma façon de m\'entraîner', bf["AF2 - Ce que j'ai appris sur ma facon de m'entrainer"]],
      ['Ce qui m\'a aidé', bf["Ce qui m'a aide a progresser en musculation"]],
      ['Ce qui m\'a freiné', bf["Ce qui m'a freine en musculation"]],
      ['AF3 — Mon rôle dans l\'équipe', bf["AF3 - Mon role dans l'equipe raid"]],
      ['AF3 — Collaboration', bf["AF3 - Comment la collaboration a fonctionne dans l'equipe"]],
      ['AF4 — Autonomie raid', bf["AF4 - Mon niveau d'autonomie dans le projet raid"]],
      ['Auto-positionnement C2.1', bf["Mon auto-positionnement global sur la capacite C2.1"]],
      ['Justification', bf["Justifie en 2-3 phrases avec exemples muscu et raid"]],
      ['Mon défi 3 mois', bf["Mon defi pour les 3 prochains mois"]],
    ];

    const reflexDispo = reflexFinal.filter(([,v]) => v);
    if (reflexDispo.length > 0) {
      html += `<div class="reflexion-grid">`;
      reflexDispo.forEach(([label, val]) => {
        html += `<div class="reflexion-item"><div class="reflexion-label">${label}</div><div class="reflexion-val">${val}</div></div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="section-title">Bilan final</div><div class="empty-state">Pas encore soumis.</div>`;
  }

  // ══════════════════════════════════════════════════════
  // 6. RÉFLEXIONS BILAN INITIAL
  // ══════════════════════════════════════════════════════
  html += `<div class="section-title">Réflexions — Bilan initial</div>`;
  const reflexInit = [
    ['Qualité la plus développée', e["Ma qualite physique la plus developpee"]],
    ['Qualité à développer', e["La qualite physique a developper en priorite"]],
    ['Ce que j\'ai découvert', e["Ce que j'ai decouvert sur moi grace a ces tests"]],
    ['Lien avec mon métier', e["Lien entre ce bilan et mon futur metier ou ma vie"]],
    ['Pourquoi ce format', e["Pourquoi ce format correspond a mes besoins"]],
    ['Contraintes principales', e["Mes principales contraintes pour pratiquer"]],
  ];
  const reflexInitDispo = reflexInit.filter(([,v]) => v);
  if (reflexInitDispo.length > 0) {
    html += `<div class="reflexion-grid">`;
    reflexInitDispo.forEach(([label, val]) => {
      html += `<div class="reflexion-item"><div class="reflexion-label">${label}</div><div class="reflexion-val">${val}</div></div>`;
    });
    html += `</div>`;
  }

  html += `<div style="height:3rem"></div>`;
  document.getElementById('dashContent').innerHTML = html;
}

// ── MODAL SÉANCE ───────────────────────────────────────────────────────────
function ouvrirSeance(idx) {
  const s = DATA.seances[idx];
  const num = s['Numero de semaine'] || (idx+1);
  document.getElementById('modalTitle').textContent = `Séance — Semaine ${num}`;

  const fields = [
    ['Date', s['Date de la seance']],
    ['APSA', s['APSA pratiquee ce jour']],
    ['Contexte', s["Cette seance s'est deroulee..."]],
    ['Format muscu', s['Format muscu ce jour (si musculation)']],
    ['Activité détaillée', s['Activite detaillee']],
    ['Durée', s['Duree totale']],
    ['Échauffement mené par', s["L'echauffement a ete mene par..."]],
    ['Description activité', s['Decris ce que tu as fait']],
    ['Borg', s['Intensite ressentie - Echelle de Borg']],
    ['FC à l\'effort', s['FC a l\'effort en bpm (si mesuree)']],
    ['Sensations physiques', s['Sensations physiques']],
    ['Sensations psychologiques', s['Sensations psychologiques']],
    ['Plaisir', s['Niveau de plaisir ressenti']],
    ['Mon rôle', s['Mon role pendant cette seance']],
    ['Lien objectif SMART', s['Lien avec mon objectif SMART ?']],
    ['Investissement', s['Investissement dans la seance']],
    ['Ce que je retiens', s['Ce que je retiens de cette seance']],
    ['À ajuster', s['Ce que je vais ajuster la prochaine fois']],
    ['150 min OMS', s['150 min OMS atteintes cette semaine ?']],
  ];

  let rows = '';
  for (let i = 0; i < fields.length; i += 2) {
    rows += `<div class="modal-row">`;
    for (let k = i; k < Math.min(i+2, fields.length); k++) {
      const [label, val] = fields[k];
      if (!val) continue;
      rows += `<div class="modal-field"><div class="modal-field-label">${label}</div><div class="modal-field-val">${val}</div></div>`;
    }
    rows += `</div>`;
  }

  document.getElementById('modalBody').innerHTML = rows || '<div class="empty-state">Pas de données.</div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function fermerModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function retourAccueil() {
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('errorMsg').textContent = '';
}
</script>

</html>
